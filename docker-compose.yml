services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: checkpoint_db
      POSTGRES_USER: ckpt_user
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [ckpt_net]

  coordinator:
    build: ./coordinator
    environment:
      DB_HOST: postgres
      DB_NAME: checkpoint_db
      DB_USER: ckpt_user
      DB_PASSWORD: secret
      WORKERS: worker1:5001,worker2:5001
    volumes:
      - checkpoint_storage:/mnt/checkpoints
    depends_on: [postgres]
    networks: [ckpt_net]

  worker1:
    build: ./worker
    environment:
      NODE_ID: worker1
      COORDINATOR_HOST: coordinator
      DB_HOST: postgres
    volumes:
      - checkpoint_storage:/mnt/checkpoints
    networks: [ckpt_net]

  worker2:
    build: ./worker
    environment:
      NODE_ID: worker2
      COORDINATOR_HOST: coordinator
      DB_HOST: postgres
    volumes:
      - checkpoint_storage:/mnt/checkpoints
    networks: [ckpt_net]

volumes:
  pg_data:
  checkpoint_storage:   # Shared volume untuk file .ckpt

networks:
  ckpt_net:
    driver: bridge
